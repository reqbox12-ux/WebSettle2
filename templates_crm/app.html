<!DOCTYPE html>
<html data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>라온스포츠 포털</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css">
  <link rel="stylesheet" href="/static/css/landing.css?v={{ asset_ver }}">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div id="app-root"></div>
  <script>
    window.INITIAL_PAGE = "{{ page }}";
    window.API_BASE = "";

    // Restore theme before JS loads to avoid flash
    (function() {
      const t = localStorage.getItem('raon_theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <script src="/static/js/app.js?v={{ asset_ver }}"></script>
</body>
</html>
